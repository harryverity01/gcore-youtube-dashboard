name: Build & deploy Gcore dashboard

on:
  schedule:
    - cron: "20 6 * * *"   # 06:20 UTC daily
  push:
    branches: [main]
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch live YouTube stats
        env:
          GCORE_TOKEN_JSON: ${{ secrets.GCORE_TOKEN_JSON }}
        run: python3 fetch_gcore_stats.py docs/data.json

      - name: Render dashboard HTML
        run: python3 build.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deploy
        uses: actions/deploy-pages@v4
